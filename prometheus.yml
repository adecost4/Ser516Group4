global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'lcomhs'
    static_configs:
      - targets: ['lcomhs:8080']
    metrics_path: '/metrics/lcomhs'
  
  - job_name: 'takt-time'
    static_configs:
      - targets: ['lcomhs:8080']
    metrics_path: '/metrics/takt-time'

  - job_name: 'leadtime'
    static_configs:
      - targets: ['lcomhs:8080']
    metrics_path: '/metrics/leadtime'